# iOS Build & Upload to App Store Connect
#
# Trigger: Manual (workflow_dispatch) from the Actions tab
#
# ============================================================
# SETUP: Before this workflow can run, you need:
#
# 1. Apple Developer Program membership ($99/year)
#    → https://developer.apple.com/programs/
#
# 2. Create an App ID in Apple Developer portal
#    → Identifiers > App IDs > com.playograph.app
#
# 3. Create a Distribution Certificate
#    → Certificates > Create > Apple Distribution
#    → Download the .cer, open in Keychain Access
#    → Export as .p12 with a password
#    → Base64 encode: base64 -i cert.p12 | pbcopy
#    → Save as GitHub secret: IOS_CERTIFICATE_BASE64
#    → Save password as: IOS_CERTIFICATE_PASSWORD
#
# 4. Create a Provisioning Profile
#    → Profiles > Create > App Store Distribution
#    → Select your App ID and certificate
#    → Download the .mobileprovision file
#    → Base64 encode: base64 -i profile.mobileprovision | pbcopy
#    → Save as GitHub secret: IOS_PROVISION_PROFILE_BASE64
#
# 5. Create an App Store Connect API Key
#    → App Store Connect > Users and Access > Keys
#    → Generate API Key (App Manager role)
#    → Note the Key ID and Issuer ID
#    → Download the .p8 file
#    → Base64 encode: base64 -i AuthKey.p8 | pbcopy
#    → Save as GitHub secrets:
#      APPSTORE_CONNECT_API_KEY_ID
#      APPSTORE_CONNECT_API_ISSUER_ID
#      APPSTORE_CONNECT_API_KEY_BASE64
#
# 6. Create the app in App Store Connect
#    → My Apps > New App > Bundle ID: com.playograph.app
# ============================================================

name: iOS Build

on:
  workflow_dispatch:
    inputs:
      upload_to_appstore:
        description: 'Upload to App Store Connect'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  build-ios:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Create web dir and sync
        run: |
          mkdir -p out
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=https://www.play-o-graph.com"></head><body></body></html>' > out/index.html
          npx cap sync ios

      - name: Install CocoaPods dependencies
        run: |
          cd ios/App
          pod install || true

      - name: Setup code signing
        env:
          IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          # Create temporary keychain
          KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db
          KEYCHAIN_PASSWORD=$(openssl rand -hex 12)

          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

          # Import certificate
          CERT_PATH=$RUNNER_TEMP/certificate.p12
          echo -n "$IOS_CERTIFICATE_BASE64" | base64 --decode -o $CERT_PATH
          security import $CERT_PATH -P "$IOS_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychain -d user -s $KEYCHAIN_PATH

          # Install provisioning profile
          PROFILE_PATH=$RUNNER_TEMP/profile.mobileprovision
          echo -n "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode -o $PROFILE_PATH

          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          cp $PROFILE_PATH ~/Library/MobileDevice/Provisioning\ Profiles/

      - name: Build archive
        run: |
          cd ios/App
          xcodebuild -workspace App.xcworkspace \
            -scheme App \
            -sdk iphoneos \
            -configuration Release \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            archive \
            CODE_SIGN_STYLE=Manual \
            | tail -20

      - name: Export IPA
        run: |
          # Create export options plist
          cat > $RUNNER_TEMP/ExportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>destination</key>
            <string>upload</string>
          </dict>
          </plist>
          PLIST

          xcodebuild -exportArchive \
            -archivePath $RUNNER_TEMP/App.xcarchive \
            -exportOptionsPlist $RUNNER_TEMP/ExportOptions.plist \
            -exportPath $RUNNER_TEMP/export \
            | tail -10

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: PlayOGraph-iOS
          path: ${{ runner.temp }}/export/*.ipa
          retention-days: 30

      - name: Upload to App Store Connect
        if: inputs.upload_to_appstore == 'true'
        env:
          API_KEY_ID: ${{ secrets.APPSTORE_CONNECT_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPSTORE_CONNECT_API_ISSUER_ID }}
          API_KEY_BASE64: ${{ secrets.APPSTORE_CONNECT_API_KEY_BASE64 }}
        run: |
          # Write API key
          mkdir -p ~/.private_keys
          echo -n "$API_KEY_BASE64" | base64 --decode > ~/.private_keys/AuthKey_${API_KEY_ID}.p8

          # Upload
          xcrun notarytool submit ${{ runner.temp }}/export/*.ipa \
            --key ~/.private_keys/AuthKey_${API_KEY_ID}.p8 \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait || true

          # Also try altool as fallback
          xcrun altool --upload-app \
            -f ${{ runner.temp }}/export/*.ipa \
            --type ios \
            --apiKey "$API_KEY_ID" \
            --apiIssuer "$API_ISSUER_ID" \
            || echo "Upload attempted. Check App Store Connect for status."

      - name: Cleanup keychain
        if: always()
        run: |
          security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
