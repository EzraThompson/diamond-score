<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 52 52" fill="none">
  <!-- Dark green scoreboard background with rounded corners -->
  <rect width="52" height="52" rx="10" fill="#1a2c18"/>
  <!-- Inset border -->
  <rect x="1" y="1" width="50" height="50" rx="9" stroke="#283f26" stroke-width="1.5" fill="none" opacity="0.8"/>

  <!-- Grid lines -->
  <line x1="0" y1="14" x2="52" y2="14" stroke="rgba(210,240,200,0.3)" stroke-width="0.8"/>
  <line x1="0" y1="38" x2="52" y2="38" stroke="rgba(210,240,200,0.3)" stroke-width="0.8"/>
  <line x1="14" y1="0" x2="14" y2="52" stroke="rgba(210,240,200,0.3)" stroke-width="0.8"/>
  <line x1="38" y1="0" x2="38" y2="52" stroke="rgba(210,240,200,0.3)" stroke-width="0.8"/>

  <!-- Diamond fill — very subtle -->
  <path d="M26 5.5 L46.5 26 L26 46.5 L5.5 26 Z" fill="rgba(220,248,210,0.07)"/>

  <!-- Diamond outline — chalk stroke -->
  <path d="M26 5.5 L46.5 26 L26 46.5 L5.5 26 Z"
        stroke="rgba(220,248,210,0.86)" stroke-width="1.8"
        stroke-linejoin="round" fill="none"/>

  <!-- Base squares -->
  <rect x="23.2" y="2.8"  width="5.6" height="5.6" rx="1.2"
        fill="rgba(220,248,210,0.2)" stroke="rgba(220,248,210,0.75)" stroke-width="1.3"/>
  <rect x="43.7" y="23.2" width="5.6" height="5.6" rx="1.2"
        fill="rgba(220,248,210,0.2)" stroke="rgba(220,248,210,0.68)" stroke-width="1.3"/>
  <rect x="2.8"  y="23.2" width="5.6" height="5.6" rx="1.2"
        fill="rgba(220,248,210,0.2)" stroke="rgba(220,248,210,0.68)" stroke-width="1.3"/>
  <!-- Home plate — bolder -->
  <rect x="23.2" y="43.7" width="5.6" height="5.6" rx="1.2"
        fill="rgba(220,248,210,0.28)" stroke="rgba(220,248,210,0.9)" stroke-width="1.5"/>
</svg>
